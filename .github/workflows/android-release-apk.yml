name: Android Release APK

on:
  push:
    branches: [main]
    paths:
      - "Lanka_Connect_v1-main/**"
      - ".github/workflows/android-release-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Lanka_Connect_v1-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.1"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Inject firebase_options.dart from secrets
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" > lib/firebase_options.dart
          else
            echo "::warning::FIREBASE_OPTIONS_DART secret not set – using template (auth will NOT work)"
            cp .firebase_templates/firebase_options.dart lib/firebase_options.dart
          fi

      - name: Inject google-services.json from secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          else
            echo "::warning::GOOGLE_SERVICES_JSON secret not set – using template"
            cp .firebase_templates/google-services.json android/app/google-services.json
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: Lanka_Connect_v1-main/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
