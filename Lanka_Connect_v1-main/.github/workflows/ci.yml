name: Lanka Connect CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: '3.38.1'
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  flutter-test:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter toolchain diagnostics
        run: |
          flutter --version
          dart --version
          flutter doctor -v

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run unit & widget tests
        run: flutter test test/ --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: coverage/lcov.info
          if-no-files-found: ignore

  functions-build:
    name: Functions Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: [flutter-test, functions-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter toolchain diagnostics
        run: |
          flutter --version
          dart --version

      - name: Build APK (debug)
        run: flutter build apk --debug --flavor staging --dart-define=APP_ENV=staging

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: build/app/outputs/flutter-apk/app-staging-debug.apk

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: [flutter-test, functions-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter toolchain diagnostics
        run: |
          flutter --version
          dart --version

      - name: Build Web
        run: flutter build web --dart-define=APP_ENV=staging

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  firebase-deploy-staging:
    name: Deploy to Firebase Staging
    runs-on: ubuntu-latest
    needs: [android-build, web-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build web for staging hosting
        run: flutter build web --dart-define=APP_ENV=staging

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to staging
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase use staging --token "$FIREBASE_TOKEN"
          firebase deploy --only hosting,firestore:rules,firestore:indexes,storage --token "$FIREBASE_TOKEN"

  firebase-deploy-production:
    name: Deploy to Firebase Production
    runs-on: ubuntu-latest
    needs: [android-build, web-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build web for production hosting
        run: flutter build web --release --dart-define=APP_ENV=production

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to production
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase use production --token "$FIREBASE_TOKEN"
          firebase deploy --only hosting,firestore:rules,firestore:indexes,storage --token "$FIREBASE_TOKEN"
