<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #033b42;
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    #startup-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #05606a 0%, #033b42 100%);
      color: #ffffff;
      z-index: 9999;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    #startup-splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 24px;
      text-align: center;
    }

    .splash-logo {
      width: min(30vw, 144px);
      min-width: 92px;
      border-radius: 28px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
    }

    .splash-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lanka_connect">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>lanka_connect</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps API key for Web - restrict in Cloud Console:
       Application restriction: HTTP referrers
       Allowed referrers:
       - http://localhost/*
       - http://127.0.0.1/*
       - https://lankaconnect-app.web.app/*
       - https://new-lanka-connect-app.web.app/* -->
  <script defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD2s5z8otGluh1i_fCXi-8GiUNtv9Pmk18"></script>
</head>
<body>
  <div id="startup-splash">
    <div class="splash-shell">
      <img class="splash-logo" src="icons/Icon-192.png" alt="Lanka Connect logo">
      <div class="splash-title">Lanka Connect</div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('startup-splash');
      if (!splash) {
        return;
      }
      splash.classList.add('hidden');
      window.setTimeout(function () {
        splash.remove();
      }, 260);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
